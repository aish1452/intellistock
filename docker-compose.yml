version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: intellistock_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
    ports:
      - "3306:3306"
    volumes:
      - intellistock_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: intellistock_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_DIALECT=mysql
      - DB_HOST=db
      - DB_NAME=inventory_db
      - DB_USER=dbuser
      - DB_PASSWORD=dbpassword
      - JWT_SECRET=intellistock_jwt_super_secret_key_123
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      db:
        condition: service_healthy

  ml-service:
    build:
      context: ./ml-service
    container_name: intellistock_ml
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=./models

  frontend:
    build:
      context: ./frontend
    container_name: intellistock_frontend
    ports:
      - "5173:80"  # Mapping browser 5173 to Nginx 80
    depends_on:
      - backend

volumes:
  intellistock_db_data:
